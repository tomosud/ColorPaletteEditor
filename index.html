<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Color Palette Editor</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/@jaames/iro@5/dist/iro.min.js"></script>
</head>
<body>
  <header class="header">
    <span class="app-title">Color Palette Editor</span>
    <div class="header-controls">
      <select id="format-select">
        <option value="">-- Select Format --</option>
      </select>
      <button id="new-palette-btn">New Palette</button>
      <button id="open-folder-btn">📁 Folder</button>
      <span class="drop-hint">or drop a PNG/JSON here</span>
    </div>
  </header>

  <div id="folder-bar" class="folder-bar hidden">
    <span class="folder-bar-icon">📁</span>
    <span id="folder-bar-name" class="folder-bar-name"></span>
    <div id="folder-file-list" class="folder-file-list"></div>
    <button id="folder-refresh-btn" class="folder-refresh-btn" title="Refresh">↻</button>
  </div>

  <div id="workspace" class="workspace">
    <div id="drop-overlay" class="drop-overlay">
      <div class="drop-overlay-text">Drop PNG or JSON to open</div>
    </div>
  </div>

  <!-- Color Picker Panel (shared, floating) -->
  <div id="color-picker-panel" class="color-picker-panel hidden">
    <div class="picker-header">
      <span class="picker-title">Color</span>
      <button id="picker-close-btn" class="picker-close-btn">✕</button>
    </div>
    <div id="iro-picker"></div>
    <div class="color-inputs">
      <div class="input-row">
        <label>Hex</label>
        <input type="text" id="hex-input" maxlength="7" placeholder="#ffffff">
      </div>
      <div class="slider-row">
        <label class="slider-label">R</label>
        <input type="range" id="r-slider" min="0" max="255" value="128" class="channel-slider">
        <input type="number" id="r-input" min="0" max="255" class="channel-num">
      </div>
      <div class="slider-row">
        <label class="slider-label">G</label>
        <input type="range" id="g-slider" min="0" max="255" value="128" class="channel-slider">
        <input type="number" id="g-input" min="0" max="255" class="channel-num">
      </div>
      <div class="slider-row">
        <label class="slider-label">B</label>
        <input type="range" id="b-slider" min="0" max="255" value="128" class="channel-slider">
        <input type="number" id="b-input" min="0" max="255" class="channel-num">
      </div>
      <div class="slider-row">
        <label class="slider-label">H</label>
        <input type="range" id="h-slider" min="0" max="360" value="0" class="channel-slider hue-track">
        <input type="number" id="h-input" min="0" max="360" class="channel-num">
      </div>
      <div class="slider-row">
        <label class="slider-label">S</label>
        <input type="range" id="s-slider" min="0" max="100" value="0" class="channel-slider">
        <input type="number" id="s-input" min="0" max="100" class="channel-num">
      </div>
      <div class="slider-row">
        <label class="slider-label">V</label>
        <input type="range" id="v-slider" min="0" max="100" value="50" class="channel-slider">
        <input type="number" id="v-input" min="0" max="100" class="channel-num">
      </div>
    </div>
    <div class="picker-actions">
      <button id="copy-color-btn">Copy</button>
      <button id="paste-color-btn">Paste</button>
      <button id="eyedropper-btn" title="画面上の色を取得 (EyeDropper)">&#x1F4A7;</button>
    </div>
    <div class="adjust-section">
      <div class="adjust-header">Adjust</div>
      <div class="slider-row">
        <label class="slider-label">dH</label>
        <input type="range" id="dh-slider" min="-180" max="180" value="0" class="channel-slider">
        <input type="number" id="dh-input" min="-180" max="180" value="0" class="channel-num">
      </div>
      <div class="slider-row">
        <label class="slider-label">dS</label>
        <input type="range" id="ds-slider" min="-100" max="100" value="0" class="channel-slider">
        <input type="number" id="ds-input" min="-100" max="100" value="0" class="channel-num">
      </div>
      <div class="slider-row">
        <label class="slider-label">dV</label>
        <input type="range" id="dv-slider" min="-100" max="100" value="0" class="channel-slider">
        <input type="number" id="dv-input" min="-100" max="100" value="0" class="channel-num">
      </div>
      <div class="adjust-actions">
        <button id="adjust-reset-btn">Reset</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
